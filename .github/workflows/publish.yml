name: Publish to npm

# Triggered on semver tag push (v0.1.0, v0.1.1, v1.0.0, ...).
# Manual workflow runs are also available via workflow_dispatch for
# re-running a failed publish without re-tagging.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true
        type: string

# Force Node.js 24 runtime for third-party JS actions still on Node 20.
# `actions/*@v5` already use Node 24 natively. Node 20 removal 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# One publish at a time per tag. If auto-tag dispatches publish while a
# manual `workflow_dispatch` run is in progress for the same tag, queue
# rather than race — npm rejects duplicate versions, but interleaving
# `npm publish` with `gh release create` would otherwise produce
# nondeterministic GitHub Release timing relative to npm. `cancel-in-
# progress: false` keeps the in-flight job alive.
concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release on publish success
      id-token: write   # npm provenance (Trusted Publishing)

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          scope: '@bleizlabs'

      - name: Verify package version matches tag (fail-fast)
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Tag: $TAG, Package: $PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Barrel completeness check
        run: npm run check:barrel

      - name: Build playground (smoke test — playground scope only; barrel exports are validated by the previous two steps)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite (E142 L1 — 51 routes + axe-core gate)
        run: npm run test:smoke

      - name: Publish
        run: npm publish --provenance --access public

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Skip if a Release already exists for this tag (e.g. created
          # manually before publish, or on retry of a failed publish run).
          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it untouched."
            exit 0
          fi
          # Extract this version's section from CHANGELOG.md (between
          # "## [<version>]" and the next "## [" heading). Falls back to
          # auto-generated notes if the section is missing.
          #
          # Use `index()` for prefix matching instead of regex. Earlier
          # iteration used `$0 ~ "^## \\[" ver "\\]"`; POSIX awk does not
          # honor `\[` / `\]` escapes inside a dynamically-built regex
          # string (warning: "escape sequence `\[' treated as plain `['"),
          # so the bracket got parsed as a character class and the section
          # never matched. `index($0, marker) == 1` is regex-free + POSIX
          # portable + immune to special chars in the version string.
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          awk -v marker="## [${VERSION}]" '
            index($0, marker) == 1     { in_section=1; next }
            in_section && index($0, "## [") == 1 { in_section=0 }
            in_section                  { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ -s "$NOTES_FILE" ]; then
            echo "Creating release $TAG with notes from CHANGELOG.md."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              -R "${{ github.repository }}"
          else
            echo "CHANGELOG section for $VERSION empty — using auto-generated notes."
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              -R "${{ github.repository }}"
          fi
