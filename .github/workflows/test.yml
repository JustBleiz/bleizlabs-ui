name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force Node.js 24 runtime for third-party JS actions whose `action.yml`
# still declares `runs.using: node20` (e.g. dorny/paths-filter@v3 — no v4
# released yet). `actions/*@v5` already declare Node 24 natively.
# GitHub Actions will force-default to Node 24 on 2026-06-02; opt in now
# to silence the deprecation warning. Independent from `node-version: 24`
# in setup-node steps (which controls the project's npm runtime).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes (path filter for e2e gating)
    runs-on: ubuntu-latest
    permissions:
      # `pull-requests: read` lets dorny/paths-filter call the GitHub API to
      # diff base vs head on PR events. Required for events sourced from
      # forks; required when GITHUB_TOKEN's default permissions are
      # restricted (this repo's default).
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `code` flips true when the PR touches anything that can affect e2e
          # rendering: components themselves, demo pages they render in,
          # Playwright config / test infra, or anything that reshapes the
          # bundle (deps + sass / next config). Keep this conservative —
          # missing a path produces silent skipped e2e on a risky PR.
          filters: |
            code:
              - 'components/**'
              - 'app/**'
              - 'styles/**'
              - 'tests/**'
              - 'scripts/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - '.github/workflows/test.yml'

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: ESLint (+ jsx-a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  barrel:
    name: Barrel completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run check:barrel

  quality:
    # E06: gates that previously ran ONLY at publish time (or never in CI).
    # All sub-second except stylelint — cheap enough to run unconditionally
    # on every push + PR (not gated by the `changes` path filter: docs-only
    # PRs are exactly the ones that break format:check / audit:jsdoc /
    # manifest sync).
    name: Quality gates (lint:css, format, jsdoc, demos, tokens, manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint:css
      - run: npm run format:check
      - run: npm run audit:jsdoc
      - run: npm run audit:demos
      - run: npm run tokens:verify
      - run: npm run check:manifest
      - name: Manifest sync (regenerated == committed)
        run: npm run check:manifest:sync
      - name: Agent docs integrity (§J rows + stamp + fence imports)
        run: node scripts/check-agents-doc.mjs

  smoke:
    name: Playwright smoke (all demo routes + axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [typecheck, lint, build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Resolve Playwright version (browser cache key)
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          npx playwright install chromium
          sudo npx playwright install-deps chromium
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run smoke suite
        run: npm run test:smoke
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 14

  e2e:
    name: Playwright per-component (keyboard + focus + aria + regression)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [smoke, changes]
    # Always on push-to-main (full guarantee on the trunk).
    # On PRs, only when the change actually touches code that can affect e2e —
    # docs / devlog / ROADMAP-only PRs stay fast and skip the ~10-min e2e job.
    # Catches regressions BEFORE merge; fixes the v0.7.5 → v0.8.3 pattern
    # where deterministic Calendar CAL-R19 failures only surfaced post-merge.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Resolve Playwright version (browser cache key)
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          npx playwright install chromium
          sudo npx playwright install-deps chromium
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run e2e suite
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-e2e-report
          path: playwright-report/
          retention-days: 14
